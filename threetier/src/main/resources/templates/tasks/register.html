<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>점수 입력</title>
</head>
<body>
    <h1>점수 입력</h1>
    <form th:action="@{/tasks/scores}" method="post" th:object="${taskVO}">
        <div>
            <label>국어 점수 : </label>
            <input type="number" th:field="*{kor}" placeholder="국어 점수">
        </div>
        <br>
        <div>
            <label>영어 점수 : </label>
            <input type="number" th:field="*{eng}" placeholder="영어 점수">
        </div>
        <br>
        <div>
            <label>수학 점수 : </label>
            <input type="number" th:field="*{math}" placeholder="수학 점수">
        </div>
        <br>
        <button type="submit">연산 결과 보기</button>
    </form>
</body>
</html>
